name: Recover Android Keystore

on:
  workflow_dispatch:

jobs:
  recover:
    runs-on: ubuntu-latest

    steps:
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 está vazio ou não existe"
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          ls -lh upload-keystore.jks

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: upload-keystore-jks
          path: upload-keystore.jks
          retention-days: 1
